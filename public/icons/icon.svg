<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff69b4"/>
      <stop offset="100%" style="stop-color:#ff1493"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="20%" style="stop-color:#ff8800"/>
      <stop offset="40%" style="stop-color:#ffff00"/>
      <stop offset="60%" style="stop-color:#00cc00"/>
      <stop offset="80%" style="stop-color:#0088ff"/>
      <stop offset="100%" style="stop-color:#8800ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- White border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ffffff" stroke-width="16"/>
  <!-- Unicorn body -->
  <ellipse cx="240" cy="300" rx="90" ry="65" fill="#ffffff"/>
  <!-- Unicorn head -->
  <circle cx="320" cy="230" r="50" fill="#ffffff"/>
  <!-- Ear -->
  <polygon points="310,185 320,160 335,188" fill="#ffffff"/>
  <polygon points="314,188 320,170 330,190" fill="#ffb6c1"/>
  <!-- Horn -->
  <polygon points="318,170 325,120 332,170" fill="#ffd700"/>
  <line x1="321" y1="160" x2="330" y2="155" stroke="#fff8dc" stroke-width="2"/>
  <line x1="320" y1="148" x2="329" y2="143" stroke="#fff8dc" stroke-width="2"/>
  <line x1="322" y1="136" x2="328" y2="133" stroke="#fff8dc" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="335" cy="225" r="8" fill="#333333"/>
  <circle cx="337" cy="222" r="3" fill="#ffffff"/>
  <!-- Blush -->
  <ellipse cx="348" cy="240" rx="10" ry="6" fill="#ffb6c1" opacity="0.6"/>
  <!-- Smile -->
  <path d="M 330 242 Q 340 255 350 242" fill="none" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="175" y="340" width="18" height="50" rx="8" fill="#ffffff"/>
  <rect x="210" y="345" width="18" height="45" rx="8" fill="#ffffff"/>
  <rect x="275" y="345" width="18" height="45" rx="8" fill="#ffffff"/>
  <rect x="305" y="340" width="18" height="50" rx="8" fill="#ffffff"/>
  <!-- Hooves -->
  <rect x="173" y="382" width="22" height="12" rx="6" fill="#ffb6c1"/>
  <rect x="208" y="382" width="22" height="12" rx="6" fill="#ffb6c1"/>
  <rect x="273" y="382" width="22" height="12" rx="6" fill="#ffb6c1"/>
  <rect x="303" y="382" width="22" height="12" rx="6" fill="#ffb6c1"/>
  <!-- Rainbow mane -->
  <path d="M 290 195 Q 270 180 260 200 Q 250 220 240 210 Q 230 200 220 220" fill="none" stroke="url(#rainbow)" stroke-width="12" stroke-linecap="round"/>
  <!-- Rainbow tail -->
  <path d="M 155 280 Q 130 260 120 280 Q 110 300 100 285" fill="none" stroke="url(#rainbow)" stroke-width="10" stroke-linecap="round"/>
  <!-- Sparkles -->
  <text x="130" y="200" font-size="30" fill="#ffd700">&#10022;</text>
  <text x="370" y="180" font-size="24" fill="#ffd700">&#10022;</text>
  <text x="380" y="320" font-size="20" fill="#ffd700">&#10022;</text>
  <text x="110" y="350" font-size="22" fill="#ffd700">&#10022;</text>
</svg>
